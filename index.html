<!DOCTYPE html>
<html>
  <head>
    <title><%= productName %></title>

    <meta charset="utf-8">
    <meta name="description" content="<%= productDescription %>">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>">

    <link rel="icon" type="image/png" sizes="128x128" href="icons/favicon-128x128.png">
    <link rel="icon" type="image/png" sizes="96x96" href="icons/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
    <link rel="icon" type="image/ico" href="icons/favicon-128x128.png">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

  </head>
  <body style="background-color: #ffffff;">
    <div id="app-loading" style="position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #ffffff; z-index: 9999;">
      <div style="width: 48px; height: 48px; border: 4px solid #FED7AA; border-top-color: #F59E0B; border-radius: 50%; animation: app-loading-spin 0.8s linear infinite;"></div>
      <p style="margin-top: 16px; font-size: 14px; color: #6B7280;">載入中...</p>
    </div>
    <style>
      @keyframes app-loading-spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <!-- quasar:entry-point -->
  </body>
</html>
